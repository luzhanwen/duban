name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-rust-security-release:
    name: Build, Rust, Security, Release Preflight
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Build formal frontend
        run: npm run build

      - name: Release preflight
        run: npm run release:preflight

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Security scan
        run: npm run security:scan
